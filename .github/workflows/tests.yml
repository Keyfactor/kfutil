name: go tests

on:
  push:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"
      - name: Install dependencies
        run: go mod download && go mod tidy
      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az --version

  # 10.x.x
  kf_10_x_x:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests for KF 10.x.x"

  ### Store Type Tests
  Test_StoreTypes_KFC_10_x_x:
    runs-on: ubuntu-latest
    needs:
      - build
      - kf_10_x_x
    strategy:
      matrix:
        command_version:
          - "1045"
          - "1021"
          - "1011"
    env:
      KEYFACTOR_DOMAIN: "command"
      KEYFACTOR_USERNAME: ${{ secrets.LAB_USERNAME }}
      KEYFACTOR_PASSWORD: ${{ secrets.LAB_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set lab environment variables
        run: |
          echo "KEYFACTOR_HOSTNAME=int${{ matrix.command_version }}-test-clean.kfdelivery.com" >> $GITHUB_ENV
          echo "SECRET_NAME=command-config-${{ matrix.command_version }}-clean" >> $GITHUB_ENV
      - name: Run tests
        run: |
          unset KFUTIL_DEBUG
          go test -v ./cmd -run "^Test_StoreTypes*"

  ### Store Tests
  Test_Stores_KFC_10_4_5:
    runs-on: ubuntu-latest
    needs:
      - build
      - kf_10_x_x
      - Test_StoreTypes_KFC_10_x_x
    strategy:
      matrix:
        command_version:
          - "1045"
          - "1021"
          - "1011"
    env:
      KEYFACTOR_DOMAIN: "command"
      KEYFACTOR_USERNAME: ${{ secrets.LAB_USERNAME }}
      KEYFACTOR_PASSWORD: ${{ secrets.LAB_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set lab environment variables
        run: |
          echo "KEYFACTOR_HOSTNAME=integrations${{ matrix.command_version }}-lab.kfdelivery.com" >> $GITHUB_ENV
          echo "SECRET_NAME=command-config-${{ matrix.command_version }}" >> $GITHUB_ENV
      - name: Run tests
        run: go test -v ./cmd -run "^Test_Stores_*"

  ### PAM Tests
  Test_PAM_KFC_10_x_x:
    runs-on: ubuntu-latest
    needs:
      - build
      - kf_10_x_x
      - Test_StoreTypes_KFC_10_x_x
    strategy:
      matrix:
        command_version:
          - "1045"
          - "1021"
          - "1011"
    env:
      KEYFACTOR_DOMAIN: "command"
      KEYFACTOR_USERNAME: ${{ secrets.LAB_USERNAME }}
      KEYFACTOR_PASSWORD: ${{ secrets.LAB_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set lab environment variables
        run: |
          echo "KEYFACTOR_HOSTNAME=integrations${{ matrix.command_version }}-lab.kfdelivery.com" >> $GITHUB_ENV
          echo "SECRET_NAME=command-config-${{ matrix.command_version }}" >> $GITHUB_ENV
      - name: Run tests
        run: |
          echo "Running PAM tests against integrations${{ matrix.command_version }}-lab.kfdelivery.com"
          go test -v ./cmd -run "^Test_PAM*"

  ### PAM Tests AKV Auth Provider
  Test_AKV_PAM_KFC_10_x_x:
    runs-on: self-hosted
    needs:
      - Test_PAM_KFC_10_x_x
    strategy:
      matrix:
        command_version:
          - "1045"
          - "1021"
          - "1011"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"
      - name: Install dependencies
        run: go mod download && go mod tidy
      - name: Set lab environment variables
        run: |
          echo "SECRET_NAME=command-config-${{ matrix.command_version }}" >> $GITHUB_ENV
      - name: Get secret from Azure Key Vault
        run: |
          echo "Getting secret $SECRET_NAME from Azure Key Vault"
          . ./examples/auth/akv/akv_auth.sh
          cat $HOME/.keyfactor/command_config.json
      - name: Install kfutil
        run: |
          make install
      - name: Run tests
        run: |
          go test -v ./cmd -run "^Test_PAM*"

